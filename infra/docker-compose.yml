services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ugraph
      POSTGRES_USER: ugraph
      POSTGRES_PASSWORD: ugraph
    ports:
      - "5432:5432"
    volumes:
      - ugraph-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugraph -d ugraph"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ugraph-postgres:
