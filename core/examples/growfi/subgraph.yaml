specVersion: 1.0.0
description: GrowFi — Regenerative Finance Subgraph (Ethereum Sepolia v4)
repository: https://github.com/growfi/growfi
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: CampaignFactory
    network: base-sepolia
    source:
      address: "0xAf81c05747EDA1e1715fF23626ab83c3351dCfF6"
      abi: CampaignFactory
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/factory.ts
      entities:
        - Campaign
        - GlobalStats
        - Protocol
      abis:
        - name: CampaignFactory
          file: ./abis/CampaignFactory.json
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,address,address,address,address,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleCampaignCreated
        - event: ProtocolFeeRecipientSet(address)
          handler: handleProtocolFeeRecipientSet
        - event: GrowfiContractsSet(indexed address,indexed address,indexed address,address)
          handler: handleGrowfiContractsSet
        - event: CampaignHiddenSet(indexed address,bool)
          handler: handleCampaignHiddenSet
        - event: CampaignPaymentTokenPolicySet(indexed address,bool,bool,bool,address)
          handler: handleCampaignPaymentTokenPolicySet

  - kind: ethereum/contract
    name: CampaignRegistry
    network: base-sepolia
    source:
      address: "0xf15E94B1db45eF645Ca611D62ECC6b10F5461515"
      abi: CampaignRegistry
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/registry.ts
      entities:
        - Campaign
      abis:
        - name: CampaignRegistry
          file: ./abis/CampaignRegistry.json
      eventHandlers:
        - event: MetadataSet(indexed address,indexed address,indexed uint256,string)
          handler: handleMetadataSet

  - kind: ethereum/contract
    name: ProducerRegistry
    network: base-sepolia
    source:
      address: "0x0ad6Af458718963aeE1C7C4e142427E9c2c381a7"
      abi: ProducerRegistry
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/producer.ts
      entities:
        - Producer
      abis:
        - name: ProducerRegistry
          file: ./abis/ProducerRegistry.json
      eventHandlers:
        - event: ProfileUpdated(indexed address,indexed uint256,string)
          handler: handleProfileUpdated
        - event: KycSet(indexed address,indexed bool,indexed address)
          handler: handleKycSet

  # ---------- GROW system (deployed 2026-05-13, block 10845468) ----------

  - kind: ethereum/contract
    name: GrowfiToken
    network: base-sepolia
    source:
      address: "0x88E1Fd001D09bE235BbEbeEd19e33E7abCF5385E"
      abi: GrowfiToken
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/grow/token.ts
      entities:
        - GrowToken
        - GrowHolder
        - GrowDirectBuy
      abis:
        - name: GrowfiToken
          file: ./abis/GrowfiToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleGrowTransfer
        - event: DirectBuy(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleDirectBuy
        - event: GenesisMinted(indexed address,uint256)
          handler: handleGenesisMinted
        - event: SaleActiveSet(bool)
          handler: handleSaleActiveSet
        - event: MarkupSet(uint256)
          handler: handleMarkupSet
        - event: ReferencePriceSet(uint256,uint256)
          handler: handleReferencePriceSet
        - event: MinterUpdated(indexed address,indexed address)
          handler: handleMinterUpdated
        - event: TreasuryUpdated(indexed address,indexed address)
          handler: handleTokenTreasuryUpdated

  - kind: ethereum/contract
    name: GrowfiTreasury
    network: base-sepolia
    source:
      address: "0x66B3b38FCe61b0E5C96e9a1F0279321b14aC54D0"
      abi: GrowfiTreasury
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/grow/treasury.ts
      entities:
        - GrowfiTreasuryState
        - StablecoinAcceptance
        - TreasuryAllocation
        - TreasuryRedemption
        - TreasuryRescue
      abis:
        - name: GrowfiTreasury
          file: ./abis/GrowfiTreasury.json
      eventHandlers:
        - event: StablecoinAccepted(indexed address,uint256,address,uint64,uint16,uint16)
          handler: handleStablecoinAccepted
        - event: StablecoinRevoked(indexed address)
          handler: handleStablecoinRevoked
        - event: CampaignTracked(indexed address)
          handler: handleCampaignTracked
        - event: CampaignUntracked(indexed address)
          handler: handleCampaignUntracked
        - event: Allocated(indexed address,indexed address,uint256,uint256)
          handler: handleAllocated
        - event: Redeemed(indexed address,uint256)
          handler: handleRedeemed
        - event: TokenRescued(indexed address,indexed address,uint256)
          handler: handleTokenRescued

  - kind: ethereum/contract
    name: GrowfiMinter
    network: base-sepolia
    source:
      address: "0xa9D37cEF4756349ad2BE0023643122Af16868B57"
      abi: GrowfiMinter
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/grow/minter.ts
      entities:
        - GrowEscrow
        - GrowEscrowClaim
        - CampaignGrowState
        - BondingCurveSnapshot
      abis:
        - name: GrowfiMinter
          file: ./abis/GrowfiMinter.json
      eventHandlers:
        - event: CampaignRegistered(indexed address)
          handler: handleCampaignRegistered
        - event: GrowEscrowed(indexed address,indexed address,uint256)
          handler: handleGrowEscrowed
        - event: GrowMinted(indexed address,indexed address,uint256)
          handler: handleGrowMinted
        - event: SoftCapReached(indexed address,uint256)
          handler: handleSoftCapReached
        - event: CampaignBuyback(indexed address,uint256)
          handler: handleCampaignBuyback
        - event: EscrowClaimed(indexed address,indexed address,uint256)
          handler: handleEscrowClaimed
        - event: BondingCurveUpdated(uint256,uint256,uint256,uint256)
          handler: handleBondingCurveUpdated
        - event: ExcludedFromMintUpdated(indexed address,bool)
          handler: handleExcludedFromMintUpdated

  - kind: ethereum/contract
    name: GrowfiFeeSplitter
    network: base-sepolia
    source:
      address: "0xF0Ad36ef051742b4397048Aa4d5D7AB08F88FEf7"
      abi: GrowfiFeeSplitter
      startBlock: 42697602
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/grow/splitter.ts
      entities:
        - FeeFlush
      abis:
        - name: GrowfiFeeSplitter
          file: ./abis/GrowfiFeeSplitter.json
      eventHandlers:
        - event: Flushed(indexed address,uint256,uint256)
          handler: handleFlushed

templates:
  - kind: ethereum/contract
    name: Campaign
    network: base-sepolia
    source:
      abi: Campaign
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/campaign.ts
      entities:
        - Campaign
        - AcceptedToken
        - Purchase
        - FundingFeeByTx
        - SellBackOrder
        - Module
        - RepaymentPool
        - Repayment
        - EcommerceStore
        - EcommerceSku
        - EcommerceOrder
        - User
      abis:
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: TokensPurchased(indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTokensPurchased
        - event: FundingFeeCollected(indexed address,indexed address,uint256)
          handler: handleFundingFeeCollected
        - event: CollateralLocked(indexed address,uint256,uint256)
          handler: handleCollateralLocked
        - event: CollateralShortfallSettled(indexed uint256,uint256,uint256)
          handler: handleCollateralShortfallSettled
        - event: AcceptedTokenAdded(indexed address,string,uint8,uint256,address)
          handler: handleAcceptedTokenAdded
        - event: AcceptedTokenRemoved(indexed address)
          handler: handleAcceptedTokenRemoved
        - event: CampaignStateChanged(uint8,uint8)
          handler: handleCampaignStateChanged
        - event: CampaignActivated(uint256,uint256)
          handler: handleCampaignActivated
        - event: BuybackTriggered(uint256,uint256,uint256)
          handler: handleBuybackTriggered
        - event: BuybackClaimed(indexed address,indexed address,uint256,uint256)
          handler: handleBuybackClaimed
        - event: SellBackRequested(indexed address,uint256,uint256)
          handler: handleSellBackRequested
        - event: SellBackFilled(indexed address,indexed address,address,uint256,uint256,uint256)
          handler: handleSellBackFilled
        - event: SellBackCancelled(indexed address,uint256)
          handler: handleSellBackCancelled
        - event: PausedSet(bool)
          handler: handlePausedSet
        - event: FundingDeadlineUpdated(uint256,uint256)
          handler: handleFundingDeadlineUpdated
        - event: MinCapUpdated(uint256,uint256)
          handler: handleMinCapUpdated
        - event: MaxCapUpdated(uint256,uint256)
          handler: handleMaxCapUpdated
        - event: ModuleAttached(indexed bytes32,indexed address,indexed bytes32,string)
          handler: handleModuleAttached
        - event: ModuleDetached(indexed bytes32,indexed address)
          handler: handleModuleDetached
        - event: ModuleEnabledSet(indexed bytes32,bool)
          handler: handleModuleEnabledSet
        - event: RepaymentInitialized(uint256)
          handler: handleRepaymentInitialized
        - event: RepaymentPoolFunded(indexed address,uint256,uint256)
          handler: handleRepaymentPoolFunded
        - event: RepaymentPoolCredited(indexed address,uint256,uint256)
          handler: handleRepaymentPoolCredited
        - event: RepaymentPoolWithdrawn(indexed address,uint256,uint256)
          handler: handleRepaymentPoolWithdrawn
        - event: RepaymentBonusSet(uint256,uint256)
          handler: handleRepaymentBonusSet
        - event: Repaid(indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleRepaid
        - event: EcommerceInitialized(uint16,uint16,string)
          handler: handleEcommerceInitialized
        - event: EcommerceCatalogURISet(string,string)
          handler: handleEcommerceCatalogURISet
        - event: EcommerceProtocolFeeSet(uint16,uint16)
          handler: handleEcommerceProtocolFeeSet
        - event: EcommerceRepaymentAllocationSet(uint16,uint16)
          handler: handleEcommerceRepaymentAllocationSet
        - event: EcommerceSkuSet(indexed bytes32,uint256,uint256,bool)
          handler: handleEcommerceSkuSet
        - event: EcommerceSkuActiveSet(indexed bytes32,bool)
          handler: handleEcommerceSkuActiveSet
        - event: EcommerceOrderPlaced(indexed uint256,indexed address,indexed bytes32,uint256,uint256,uint256,uint256,uint256,bytes32)
          handler: handleEcommerceOrderPlaced

  - kind: ethereum/contract
    name: StakingVault
    network: base-sepolia
    source:
      abi: StakingVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/staking.ts
      entities:
        - Position
        - Season
        - YieldRateSnapshot
        - Campaign
      abis:
        - name: StakingVault
          file: ./abis/StakingVault.json
      eventHandlers:
        - event: Staked(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,indexed uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleUnstaked
        - event: Restaked(indexed address,indexed uint256,uint256,uint256)
          handler: handleRestaked
        - event: YieldMinted(indexed address,indexed uint256,uint256,uint256)
          handler: handleYieldMinted
        - event: YieldRateUpdated(uint256,uint256,uint256)
          handler: handleYieldRateUpdated
        - event: SeasonStarted(indexed uint256,uint256)
          handler: handleSeasonStarted
        - event: SeasonEnded(indexed uint256,uint256,uint256)
          handler: handleSeasonEnded

  - kind: ethereum/contract
    name: HarvestManager
    network: base-sepolia
    source:
      abi: HarvestManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/harvest.ts
      entities:
        - Season
        - Claim
        - Campaign
      abis:
        - name: HarvestManager
          file: ./abis/HarvestManager.json
      eventHandlers:
        - event: HarvestReported(indexed uint256,uint256,uint256,uint256,uint256,bytes32,uint256,uint256,uint256)
          handler: handleHarvestReported
        - event: ProductRedeemed(indexed address,indexed uint256,uint256,uint256,bytes32)
          handler: handleProductRedeemed
        - event: USDCCommitted(indexed address,indexed uint256,uint256,uint256)
          handler: handleUSDCCommitted
        - event: USDCDeposited(indexed uint256,indexed address,uint256,uint256,uint256)
          handler: handleUSDCDeposited
        - event: USDCRedeemed(indexed address,indexed uint256,uint256)
          handler: handleUSDCRedeemed
